<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DaisyUI Project</title>
    <link href="https://cdn.jsdelivr.net/npm/flowbite@2.5.1/dist/flowbite.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet" type="text/css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
    

<nav class="bg-slate-700 border-gray-200 text-white">
  <div class="max-w-screen-xl flex flex-wrap items-center justify-between mx-auto p-4">
  <a href="https://flowbite.com/" class="flex items-center space-x-3 rtl:space-x-reverse">
      <span class="self-center text-2xl font-semibold whitespace-nowrap">TravelXplorer</span>
  </a>
  <div class="flex md:order-2 space-x-3 md:space-x-0 rtl:space-x-reverse">
      <button type="button" class="text-black bg-orange-700 focus:ring-4 focus:outline-none focus:ring-blue-300 font-bold rounded-full text-base px-8 py-2 text-center">Sign Up</button>
      <button data-collapse-toggle="navbar-cta" type="button" class="inline-flex items-center p-2 w-10 h-10 justify-center text-sm text-gray-500 rounded-lg md:hidden hover:bg-gray-100 focus:outline-none focus:ring-2 focus:ring-gray-200" aria-controls="navbar-cta" aria-expanded="false">
        <span class="sr-only">Open main menu</span>
        <svg class="w-5 h-5" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 17 14">
            <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M1 1h15M1 7h15M1 13h15"/>
        </svg>
    </button>
  </div>
  <div class="items-center justify-between hidden w-full md:flex md:w-auto md:order-1" id="navbar-cta">
    <ul class="flex flex-col font-medium p-4 md:p-0 mt-4 border border-gray-100 rounded-lg bg-gray-50 md:space-x-8 rtl:space-x-reverse md:flex-row md:mt-0 md:border-0 md:bg-transparent">
      <li>
        <a href="#" class="block py-2 px-3 md:p-0 text-white rounded md:bg-transparent" aria-current="page">Home</a>
      </li>
      <li>
        <a href="#" class="block py-2 px-3 md:p-0 text-white rounded">About</a>
      </li>
      <li>
        <a href="#" class="block py-2 px-3 md:p-0 text-white rounded">Contact</a>
      </li>
      <li>
        <a href="#" class="block py-2 px-3 md:p-0 text-white rounded">Blog</a>
      </li>
    </ul>
  </div>
  </div>
</nav>

<div class="hero bg-slate-700 min-h-screen text-gray-50">
  <div class="hero-content w-10/12 p-0 flex-col lg:flex-row-reverse">
    <img
      src="https://img.daisyui.com/images/stock/photo-1635805737707-575885ab0820.webp"
      class="max-w-sm rounded-lg shadow-2xl" />
    <div class="w-1/2">
      <button type="button" class="text-orange-600 bg-orange-200 focus:outline-none focus:ring-4 focus:ring-yellow-300 font-medium rounded-full text-sm px-5 py-2.5 text-center me-2 mb-2">Get Update News&nbsp;&nbsp;<i class="far fa-paper-plane text-lg"></i></button>
      <h1 class="text-5xl font-bold w-9/12">Your Ultimate Travel Companion</h1>
      <p class="py-6 w-9/12">
        Discover, plan, and explore with ease using TravelXplorer - the all-in-one travel app that empowers you to create unforgettable journeys.
      </p>
      <div class="rounded-full bg-white text-black flex items-center justify-between px-6 py-4">
        <div>
          <i class="fas fa-map-marker-alt text-green-800"></i>
          <select class="appearance-none bg-white border border-gray-300 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm">
            <option value="">Select a location</option>
            <option value="paris">Paris, France</option>
            <option value="london">London, UK</option>
            <option value="new_york">New York, USA</option>
          </select>
          
        </div>
        <i class="fas fa-calendar-alt text-green-800"></i>
        <div>
        </div>
      </div>       
    </div>
  </div>
</div>
</body>
</html>
